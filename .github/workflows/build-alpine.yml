name: Build Terax (Alpine aarch64 musl)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-alpine-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build inside Alpine aarch64 container
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:3.21 \
            sh -lc '
              set -eux
              apk add --no-cache \
                curl wget bash git \
                nodejs npm \
                webkit2gtk-4.1-dev \
                gtk+3.0-dev \
                librsvg-dev \
                openssl-dev \
                musl-dev musl \
                gcc g++ \
                file \
                patchelf \
                pkgconf \
                wayland-dev \
                libunwind-dev

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              source "$HOME/.cargo/env"
              rustc --version
              cargo --version
              uname -m

              npm install -g pnpm@9

              if grep -q "minimumReleaseAge" pnpm-workspace.yaml && ! grep -q "^packages:" pnpm-workspace.yaml; then
                cp pnpm-workspace.yaml pnpm-workspace.yaml.orig
                printf "packages: []\n" > pnpm-workspace.yaml.tmp
                cat pnpm-workspace.yaml.orig >> pnpm-workspace.yaml.tmp
                mv pnpm-workspace.yaml.tmp pnpm-workspace.yaml
              fi

              pnpm install --no-frozen-lockfile
              npx vite build

              export RUSTFLAGS="-C target-feature=-crt-static -C link-arg=-L/usr/lib -C link-arg=-lunwind"
              export LIBRARY_PATH="/usr/lib"
              export PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/lib/share/pkgconfig"
              export CARGO_NET_GIT_FETCH_WITH_CLI="true"
              cd src-tauri
              cargo build --release
              cd ..

              file src-tauri/target/release/terax
              chmod 755 src-tauri/target/release/terax
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terax-alpine-aarch64-musl
          path: |
            src-tauri/target/release/terax
            dist/
          if-no-files-found: error
          retention-days: 7
