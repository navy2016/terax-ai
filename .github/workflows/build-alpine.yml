name: Build Terax (Alpine musl)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-alpine:
    runs-on: ubuntu-22.04
    container:
      image: alpine:3.21
    env:
      RUSTFLAGS: "-C target-feature=-crt-static -C link-arg=-L/usr/lib -C link-arg=-lunwind"
      LIBRARY_PATH: "/usr/lib"
      PKG_CONFIG_PATH: "/usr/lib/pkgconfig:/usr/lib/share/pkgconfig"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Install system build dependencies
        run: |
          apk add --no-cache \
            curl wget bash git \
            nodejs npm \
            webkit2gtk-4.1-dev \
            gtk+3.0-dev \
            librsvg-dev \
            openssl-dev \
            musl-dev musl \
            gcc g++ \
            file \
            patchelf \
            pkgconf \
            wayland-dev \
            libunwind-dev

      - name: Install Rust (stable via rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version
          # Show where libunwind is
          find / -maxdepth 4 -name "libunwind*" -type f 2>&1 || true

      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-musl-v5-${runner.arch}-${hashFiles('src-tauri/Cargo.lock')}
          restore-keys: cargo-musl-v5-${runner.arch}-

      - name: Fix pnpm-workspace.yaml for pnpm 9
        run: |
          if grep -q "minimumReleaseAge" pnpm-workspace.yaml && ! grep -q "^packages:" pnpm-workspace.yaml; then
            cp pnpm-workspace.yaml pnpm-workspace.yaml.orig
            printf 'packages: []\n' > pnpm-workspace.yaml.tmp
            cat pnpm-workspace.yaml.orig >> pnpm-workspace.yaml.tmp
            mv pnpm-workspace.yaml.tmp pnpm-workspace.yaml
          fi

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (cargo build --release)
        run: |
          source "$HOME/.cargo/env"
          cd src-tauri
          cargo build --release 2>&1

      - name: Verify binary
        run: |
          echo "=== Built binary ==="
          find src-tauri/target/release -maxdepth 1 -type f -name "terax" -exec file {} \;
          ls -la src-tauri/target/release/terax 2>&1

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terax-alpine-musl
          path: |
            src-tauri/target/release/terax
            dist/
          if-no-files-found: warn
          retention-days: 7
