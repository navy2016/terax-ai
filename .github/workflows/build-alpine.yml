name: Build Terax (Alpine musl)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-alpine:
    runs-on: ubuntu-22.04
    container:
      image: alpine:3.21
    steps:
      - name: Install system build dependencies
        run: |
          apk add --no-cache \
            curl wget bash git \
            nodejs npm \
            webkit2gtk-4.1-dev \
            gtk+3.0-dev \
            librsvg-dev \
            openssl-dev \
            musl-dev \
            gcc g++ \
            file \
            patchelf \
            pkgconf \
            wayland-dev \
            libunwind-dev

      - name: Install Rust (stable via rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-musl-v3-${{runner.arch}}-${{hashFiles('src-tauri/Cargo.lock')}}
          restore-keys: cargo-musl-v3-${{runner.arch}}-

      - name: Fix pnpm-workspace.yaml for pnpm 9
        run: |
          if grep -q "minimumReleaseAge" pnpm-workspace.yaml && ! grep -q "^packages:" pnpm-workspace.yaml; then
            cp pnpm-workspace.yaml pnpm-workspace.yaml.orig
            printf 'packages: []\n' > pnpm-workspace.yaml.tmp
            cat pnpm-workspace.yaml.orig >> pnpm-workspace.yaml.tmp
            mv pnpm-workspace.yaml.tmp pnpm-workspace.yaml
          fi

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (cargo build --release)
        run: |
          source "$HOME/.cargo/env"
          cd src-tauri
          # Use system linker with libunwind, disable self-contained
          export RUSTFLAGS="-C link-self-contained=no -C link-arg=-lunwind"
          cargo build --release 2>&1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Verify binary
        run: |
          echo "=== Built binary ==="
          find src-tauri/target/release -maxdepth 1 -type f -name "terax" -exec file {} \;
          ls -la src-tauri/target/release/terax 2>&1

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terax-alpine-musl
          path: |
            src-tauri/target/release/terax
            dist/
          if-no-files-found: warn
          retention-days: 7
